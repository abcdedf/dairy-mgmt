name: dairy_mgmt
description: Dairy Production & Sales Management App
publish_to: none
version: 1.0.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  http: ^1.2.0
  intl: ^0.19.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.3
  web: ^1.1.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0
  pdf: ^3.10.0
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  # These images are NOT loaded via rootBundle (Flutter web bug).
  # They are base64-embedded in lib/core/pdf_images.dart instead.
  # See docs/adding-pdf-images.md for details.
  assets:
    - assets/images/challan_header.png
    - assets/images/challan_footer.png
    - assets/images/invoice_header.png
    - assets/images/invoice_footer.png
